<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>辐射安全考核智能系统</title>
    <script src="quiz_data.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #2ecc71; --danger: #e74c3c; --warning: #f1c40f; --bg: #f4f6f9; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: var(--bg); color: #333; padding: 12px; padding-bottom: 30px; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: var(--primary); font-size: 20px; margin-bottom: 4px; }
        .subtitle { text-align: center; color: #7f8c8d; font-size: 11px; margin-bottom: 15px; }
        .mode-tabs { display: flex; margin-bottom: 15px; border-bottom: 2px solid #eee; gap: 5px; }
        .tab-btn { padding: 10px 5px; background: none; border: none; font-size: 13px; cursor: pointer; color: #666; font-weight: bold; flex: 1; text-align: center; }
        .tab-btn.active { color: var(--accent); border-bottom: 3px solid var(--accent); margin-bottom: -2px; }
        .control-panel { display: flex; justify-content: space-between; align-items: center; background: #e9ecef; padding: 8px 12px; border-radius: 6px; margin-bottom: 15px; font-size: 13px; font-weight: bold; }
        .stats-badge { background: var(--primary); color: white; padding: 2px 8px; border-radius: 10px; font-size: 11px; margin-left: 4px; }
        .btn-toggle { background: var(--accent); color: white; padding: 5px 10px; border: none; border-radius: 4px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .exam-dashboard { background: #fff3cd; border: 1px solid #ffeeba; color: #856404; padding: 12px; border-radius: 8px; margin-bottom: 15px; text-align: center; }
        .exam-timer { font-size: 28px; font-weight: bold; color: var(--danger); margin: 3px 0; }
        .exam-submit-all { background: var(--danger); color: white; padding: 12px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; width: 100%; display: none; margin-top: 15px; cursor: pointer; }
        .exam-report { padding: 18px; border-radius: 8px; margin-bottom: 20px; text-align: center; display: none; }
        .exam-report.pass { background: #d4edda; border: 2px solid var(--success); color: #155724; }
        .exam-report.fail { background: #f8d7da; border: 2px solid var(--danger); color: #721c24; }
        .report-score { font-size: 38px; font-weight: bold; margin: 2px 0; }
        .report-result { font-size: 20px; font-weight: bold; }
        .question-card { background: #fff; border: 1px solid #dee2e6; border-radius: 8px; padding: 14px; margin-bottom: 15px; }
        .question-card.wrong-ans { border-left: 4px solid var(--danger); background: #fff8f8; }
        .question-card.correct-ans { border-left: 4px solid var(--success); background: #f8fff8; }
        .question-card.exam-answered { border-left: 4px solid var(--accent); }
        .q-title { font-size: 14px; font-weight: 600; line-height: 1.4; margin-bottom: 12px; }
        .badge { display: inline-block; padding: 2px 5px; font-size: 10px; border-radius: 3px; color: white; margin-right: 4px; }
        .badge-single { background: #3498db; } .badge-multi { background: #9b59b6; } .badge-cat { background: #e67e22; }
        .options-group { list-style: none; }
        .option-item { display: flex; align-items: center; padding: 11px 12px; margin-bottom: 7px; border: 1px solid #ced4da; border-radius: 6px; background: #fefefe; font-size: 14px; cursor: pointer; }
        .option-item input { margin-right: 10px; width: 17px; height: 17px; flex-shrink: 0; }
        .option-item.is-right { background: #d4edda !important; border-color: var(--success) !important; color: #155724; font-weight: bold; }
        .option-item.is-wrong { background: #f8d7da !important; border-color: var(--danger) !important; color: #721c24; }
        .option-item.is-selected { background: #e2e3e5; border-color: #383d41; }
        .feedback-zone { margin-top: 10px; padding: 10px; border-radius: 4px; font-size: 13px; font-weight: bold; display: none; }
        .multi-submit-btn { background: var(--primary); color: white; padding: 8px; border: none; border-radius: 4px; font-size: 13px; margin-top: 5px; width: 100%; font-weight: bold; display: none; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <h1>辐射安全考核智能系统</h1>
    <div class="subtitle">规范化模考版（120分制 · 45分钟）</div>
    
    <div class="mode-tabs">
        <button class="tab-btn active" id="tabAll" onclick="switchMode('all')">📝 智能刷题</button>
        <button class="tab-btn" id="tabExam" onclick="switchMode('exam')">⏱️ 全真模考</button>
        <button class="tab-btn" id="tabWrong" onclick="switchMode('wrong')">⚠️ 错题本 <span id="wrongTabCount" class="stats-badge" style="background:var(--danger)">0</span></button>
    </div>

    <div class="exam-dashboard" id="examDashboard" style="display: none;">
        <div style="font-size: 13px; font-weight: bold;">40%法律法规 + 60%防护基础 (共50题，满分120分)</div>
        <div class="exam-timer" id="examTimer">45:00</div>
        <div style="font-size: 11px; color:#c0392b;">提示：多选题错选不得分；漏选时，每选对一个选项得 1 分</div>
    </div>

    <div class="exam-report" id="examReport">
        <div class="report-result" id="reportResult">未通过</div>
        <div class="report-score" id="reportScore">0 分</div>
        <div id="reportDetails" style="font-size: 13px; margin-top: 4px;"></div>
    </div>

    <div class="control-panel" id="controlPanel">
        <div>范围：<span class="stats-badge" id="loadedCount">0 题</span></div>
        <button id="orderBtn" class="btn-toggle" onclick="toggleOrder()">🔄 顺序模式</button>
    </div>

    <div id="quizFlow"></div>
    <button class="exam-submit-all" id="examSubmitBtn" onclick="submitWholeExam()">🏁 提交试卷评分</button>
</div>

<script>
    let currentMode = 'all', isRandom = false, renderList = [], answeredStatus = {};
    let isExamSubmitted = false, examUserAnswers = {}, examTimerInterval = null, examSecondsLeft = 2700;

    function getWrongList() { return JSON.parse(localStorage.getItem('rad_exam_wrongs') || '[]'); }
    function saveWrongList(list) { localStorage.setItem('rad_exam_wrongs', JSON.stringify(list)); updateWrongBadge(); }
    function updateWrongBadge() { document.getElementById('wrongTabCount').innerText = getWrongList().length; }

    window.onload = function() { 
        if (typeof localQuestionBank === 'undefined') {
            document.getElementById('quizFlow').innerHTML = '<div style="color:red;padding:20px;text-align:center;">❌ 未检测到题库数据，请先运行 python build_quiz.py 生成 quiz_data.js</div>';
            return;
        }
        updateWrongBadge(); 
        prepareData(); 
    };

    function prepareData() {
        answeredStatus = {};
        document.getElementById('examDashboard').style.display = 'none';
        document.getElementById('examSubmitBtn').style.display = 'none';
        document.getElementById('examReport').style.display = 'none';
        document.getElementById('controlPanel').style.display = 'flex';
        clearInterval(examTimerInterval);

        if (currentMode === 'all') {
            renderList = [...localQuestionBank];
            if (isRandom) shuffleArray(renderList);
        } else if (currentMode === 'wrong') {
            let wrongIds = getWrongList();
            renderList = localQuestionBank.filter(q => wrongIds.includes(q.id));
            if (isRandom) shuffleArray(renderList);
        } else if (currentMode === 'exam') {
            document.getElementById('controlPanel').style.display = 'none';
            buildStandardExamPaper();
            return;
        }
        renderQuizView();
    }

    function shuffleArray(arr) { arr.sort(() => Math.random() - 0.5); }

    function buildStandardExamPaper() {
        isExamSubmitted = false; examUserAnswers = {};
        let lawSingle = localQuestionBank.filter(q => q.category === '法律' && q.type === 'single');
        let lawMulti = localQuestionBank.filter(q => q.category === '法律' && q.type === 'multi');
        let baseSingle = localQuestionBank.filter(q => q.category === '基础' && q.type === 'single');
        let baseMulti = localQuestionBank.filter(q => q.category === '基础' && q.type === 'multi');

        shuffleArray(lawSingle); shuffleArray(lawMulti); shuffleArray(baseSingle); shuffleArray(baseMulti);

        renderList = [
            ...lawSingle.slice(0, 16), ...lawMulti.slice(0, 4),
            ...baseSingle.slice(0, 24), ...baseMulti.slice(0, 6)
        ];
        shuffleArray(renderList);

        document.getElementById('examDashboard').style.display = 'block';
        document.getElementById('examSubmitBtn').style.display = 'block';
        
        examSecondsLeft = 2700;
        updateTimerDisplay();
        examTimerInterval = setInterval(() => {
            examSecondsLeft--;
            updateTimerDisplay();
            if (examSecondsLeft <= 0) { clearInterval(examTimerInterval); alert("时间到，系统已自动交卷！"); submitWholeExam(); }
        }, 1000);
        renderQuizView();
    }

    function updateTimerDisplay() {
        let m = Math.floor(examSecondsLeft / 60), s = examSecondsLeft % 60;
        document.getElementById('examTimer').innerText = (m < 10 ? '0'+m : m) + ':' + (s < 10 ? '0'+s : s);
    }

    function renderQuizView() {
        document.getElementById('loadedCount').innerText = renderList.length + ' 题';
        const flowBox = document.getElementById('quizFlow'); flowBox.innerHTML = '';
        if (renderList.length === 0) {
            flowBox.innerHTML = '<div style="text-align:center;padding:40px;color:#888;">🎉 队列为空！</div>'; return;
        }
        renderList.forEach((q, displayIdx) => {
            const card = document.createElement('div'); card.className = 'question-card'; card.id = 'card_' + q.id;
            let html = '<div class="q-title"><span class="badge ' + (q.type==='single'?'badge-single':'badge-multi') + '">' + (q.type==='single'?'单选':'多选') + '</span><span class="badge badge-cat">' + (q.category || '基础') + '</span><strong>\u0020' + (displayIdx + 1) + '.\u0020</strong>' + q.question + '</div><ul class="options-group">';
            q.options.forEach((opt, oIdx) => {
                html += '<li class="option-item" id="li_' + q.id + '_' + oIdx + '" onclick="triggerSelect(' + q.id + ', ' + oIdx + ', \'' + q.type + '\')"><input type="' + (q.type==='single'?'radio':'checkbox') + '" name="ans_' + q.id + '" id="in_' + q.id + '_' + oIdx + '"><label style="flex-grow:1;cursor:pointer;">\u0020' + String.fromCharCode(65+oIdx) + '、' + opt + '</label></li>';
            });
            html += '</ul>';
            if(q.type === 'multi' && currentMode !== 'exam') {
                html += '<button class="multi-submit-btn" id="btn_' + q.id + '" onclick="checkMulti(' + q.id + ')">确认选择</button>';
            }
            card.innerHTML = html + '<div class="feedback-zone" id="feed_' + q.id + '"></div>';
            flowBox.appendChild(card);
        });
    }

    function triggerSelect(qId, oIdx, qType) {
        if (currentMode === 'exam' && isExamSubmitted) return;
        if (currentMode !== 'exam' && answeredStatus[qId]) return;
        const input = document.getElementById('in_' + qId + '_' + oIdx);
        if (currentMode !== 'exam') {
            if (qType === 'single') { input.checked = true; checkSingle(qId, oIdx); }
            else { input.checked = !input.checked; document.getElementById('btn_' + qId).style.display = 'block'; }
        } else {
            input.checked = qType === 'single' ? true : !input.checked;
            if (qType === 'single') {
                examUserAnswers[qId] = [oIdx];
                document.getElementsByName('ans_' + qId).forEach((inp, idx) => inp.parentElement.classList.toggle('is-selected', idx === oIdx));
            } else {
                let selected = [];
                document.getElementsByName('ans_' + qId).forEach((inp, idx) => {
                    inp.parentElement.classList.toggle('is-selected', inp.checked);
                    if(inp.checked) selected.push(idx);
                });
                examUserAnswers[qId] = selected;
            }
            document.getElementById('card_' + qId).classList.add('exam-answered');
        }
    }

    function submitWholeExam() {
        clearInterval(examTimerInterval); isExamSubmitted = true;
        document.getElementById('examDashboard').style.display = 'none';
        document.getElementById('examSubmitBtn').style.display = 'none';
        let totalScore = 0, singleOk = 0, multiOk = 0, multiPartial = 0, wrongs = getWrongList();

        renderList.forEach(q => {
            let userAns = examUserAnswers[q.id] || [];
            let feed = document.getElementById('feed_' + q.id), card = document.getElementById('card_' + q.id);
            let ansStr = q.answer.map(i => String.fromCharCode(65 + i)).join(', ');
            document.getElementsByName('ans_' + q.id).forEach(i => { i.disabled = true; i.parentElement.classList.remove('is-selected'); });
            q.options.forEach((opt, idx) => {
                let li = document.getElementById('li_' + q.id + '_' + idx);
                if (q.answer.includes(idx)) li.classList.add('is-right');
                else if (userAns.includes(idx)) li.classList.add('is-wrong');
            });
            if (q.type === 'single') {
                if (userAns.length > 0 && userAns[0] === q.answer[0]) { totalScore += 2; singleOk++; card.className = "question-card correct-ans"; }
                else { card.className = "question-card wrong-ans"; if(!wrongs.includes(q.id)) wrongs.push(q.id); }
            } else {
                let hasWrong = userAns.some(idx => !q.answer.includes(idx));
                if (hasWrong || userAns.length === 0) { card.className = "question-card wrong-ans"; if(!wrongs.includes(q.id)) wrongs.push(q.id); }
                else if (userAns.length === q.answer.length) { totalScore += 4; multiOk++; card.className = "question-card correct-ans"; }
                else { let pScore = userAns.length * 1; totalScore += pScore; multiPartial++; card.className = "question-card wrong-ans"; if(!wrongs.includes(q.id)) wrongs.push(q.id); }
            }
            feed.innerHTML = "正确答案：" + ansStr; feed.style.display = 'block';
        });
        saveWrongList(wrongs);
        let isPass = totalScore >= 90;
        let rep = document.getElementById('examReport');
        rep.className = isPass ? "exam-report pass" : "exam-report fail";
        document.getElementById('reportResult').innerText = isPass ? "🎉 考核合格" : "❌ 未通过";
        document.getElementById('reportScore').innerText = totalScore + " 分";
        document.getElementById('reportDetails').innerText = "单选满分: " + singleOk + " 题 | 多选全对: " + multiOk + " 题 | 多选漏选得分: " + multiPartial + " 题";
        rep.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function checkSingle(qId, userIdx) {
        answeredStatus[qId] = true;
        let q = localQuestionBank.find(item => item.id === qId), correctIdx = q.answer[0];
        let feed = document.getElementById('feed_' + qId), card = document.getElementById('card_' + qId);
        if (userIdx === correctIdx) {
            card.classList.add('correct-ans'); document.getElementById('li_' + qId + '_' + correctIdx).classList.add('is-right');
            if(currentMode === 'wrong') saveWrongList(getWrongList().filter(id => id !== qId));
        } else {
            card.classList.add('wrong-ans'); document.getElementById('li_' + qId + '_' + userIdx).classList.add('is-wrong');
            document.getElementById('li_' + qId + '_' + correctIdx).classList.add('is-right');
            let cw = getWrongList(); if (!cw.includes(qId)) { cw.push(qId); saveWrongList(cw); }
        }
        feed.innerHTML = "正确答案：" + String.fromCharCode(65+correctIdx); feed.style.display = 'block';
    }

    function checkMulti(qId) {
        answeredStatus[qId] = true; document.getElementById('btn_' + qId).style.display = 'none';
        let q = localQuestionBank.find(item => item.id === qId), inputs = document.getElementsByName('ans_' + qId), userChose = [];
        inputs.forEach(input => { input.disabled = true; if(input.checked) userChose.push(parseInt(input.id.split('_')[2])); });
        let isCorrect = JSON.stringify(userChose.sort()) === JSON.stringify(q.answer.sort());
        let card = document.getElementById('card_' + qId), feed = document.getElementById('feed_' + qId);
        inputs.forEach(input => { let val = parseInt(input.id.split('_')[2]); if (q.answer.includes(val)) input.parentElement.classList.add('is-right'); else if (input.checked) input.parentElement.classList.add('is-wrong'); });
        if(isCorrect) {
            card.classList.add('correct-ans'); if(currentMode === 'wrong') saveWrongList(getWrongList().filter(id => id !== qId));
        } else {
            card.classList.add('wrong-ans'); let cw = getWrongList(); if (!cw.includes(qId)) { cw.push(qId); saveWrongList(cw); }
        }
        feed.innerHTML = "正确答案：" + q.answer.map(i => String.fromCharCode(65 + i)).join(', '); feed.style.display = 'block';
    }

    function switchMode(mode) { 
        if(currentMode === 'exam' && !isExamSubmitted && mode !== 'exam') {
            if(!confirm("正在模拟考试，离开将丢失本场成绩，确定离开？")) return;
        }
        currentMode = mode; 
        document.getElementById('tabAll').classList.toggle('active', mode==='all');
        document.getElementById('tabExam').classList.toggle('active', mode==='exam');
        document.getElementById('tabWrong').classList.toggle('active', mode==='wrong');
        prepareData(); 
    }
    function toggleOrder() { isRandom = !isRandom; document.getElementById('orderBtn').innerText = isRandom ? "🔄 乱序模式" : "🔄 顺序模式"; prepareData(); }
</script>
</body>
</html>
